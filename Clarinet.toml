[project]
name = 'intellidefi-stacks'
description = 'IntelliDeFi Protocol - AI-Driven DeFi Strategies on Bitcoin'
authors = []
telemetry = true
cache_dir = './.cache'
requirements = []

[contracts.strategy-engine]
path = 'contracts/strategy-engine.clar'
clarity_version = 4
epoch = 'latest'

[contracts.risk-manager]
path = 'contracts/risk-manager.clar'
clarity_version = 4
epoch = 'latest'

[contracts.protocol-registry]
path = 'contracts/protocol-registry.clar'
clarity_version = 4
epoch = 'latest'

[contracts.ai-oracle]
path = 'contracts/ai-oracle.clar'
clarity_version = 4
epoch = 'latest'

[contracts.strategy-optimizer]
path = 'contracts/strategy-optimizer.clar'
clarity_version = 4
epoch = 'latest'

[contracts.audit-trail]
path = 'contracts/audit-trail.clar'
clarity_version = 4
epoch = 'latest'

[contracts.compliance-monitor]
path = 'contracts/compliance-monitor.clar'
clarity_version = 4
epoch = 'latest'

[repl.analysis]
passes = ['check_checker']

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false

[repl.remote_data]
enabled = false
api_url = 'https://api.hiro.so'
